# hermes-agent preset: local ollama as the model provider (v12 providers schema).
# Verified against hermes-agent 0.18.0 on 2026-07-05 — this file's keys mirror
# the REAL config at ~/.hermes/config.yaml (`hermes config path`), NOT a
# standalone cli-config; merge these keys into that file.
# Model ids must exist in `ollama list` — see packages/local-models/MODELS.md
# banked table for the verified set. No secrets: local endpoints need none.

model:
  default: qwen3.6-27b-mtp
  provider: ollama

providers:
  ollama:
    name: Ollama (local)
    api: http://localhost:11434/v1
    api_key: ollama
    default_model: qwen3.6-27b-mtp
    models:
      - qwen3.6-27b-mtp     # verified agentic (pi harness pass)
      - qwen3.5-9b-mtp      # verified agentic (pi harness pass)
      - gemma4:latest       # verified agentic (pi harness pass)
      - qwen3.6-35b-mtp     # tool-calls ok; pre-warm before harness use (cold load > client timeout)

  # llm — the SHARED hosted model-gateway on the cluster (LiteLLM; renamed
  # from "neuralwatt" — that name now refers only to one upstream vendor).
  # Upstreams: Crusoe, OpenRouter, Anthropic (direct), MorphLLM. Not local:
  # needs the shared virtual key (set api_key to it, or UNSIGNED_LLM_API_KEY;
  # 1P item: unsigned-llm).
  llm:
    name: llm (unsigned model gateway)
    api: https://llm.unsigned.gg/v1
    api_key: env:UNSIGNED_LLM_API_KEY
    # default kept deliberately cheap (operator directive 2026-07-08) — flip to
    # zai/GLM-5.2 (or any listed id) in your live config for heavier work
    default_model: google/gemini-3.5-flash
    models:
      - zai/GLM-5.2                            # literal GLM-5.2, hosted (Crusoe)
      - deepseek-ai/DeepSeek-V4-Pro
      - Qwen/Qwen3-235B-A22B-Instruct-2507
      - moonshotai/Kimi-K2.6
      - openai/gpt-5.5                         # OpenRouter
      - google/gemini-3.5-flash                # OpenRouter
      - moonshotai/kimi-k2.7-code              # OpenRouter
      - mistralai/devstral-2512                # OpenRouter
      - claude-sonnet-5                        # Anthropic, direct (cache-sticky)
      - claude-haiku-4-5
      - claude-opus-4-8
      - morph-v3-fast                          # MorphLLM fast-apply
      - morph-glm52-744b
      - nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B  # NVIDIA upstream (gateway)
      - nvidia/NVIDIA-Nemotron-3-Super-120B-A12B
      - nvidia/NVIDIA-Nemotron-3-Ultra-550B
      - nvidia/Nemotron-3-Nano-Omni-Reasoning-30B-A3B

# Alternate local endpoints (swap `api`):
#   llama.cpp: http://localhost:8080/v1   (serve/serve-llamacpp.sh)
#   vLLM:      http://localhost:8000/v1   (serve/serve-vllm.sh)

# Memory/skill-loop boundary vs Engram (OPS-480, 2026-07-08; see README Verdict
# section for the full reasoning). hermes's built-in memory store (two flat
# files, ~/.hermes/memories/MEMORY.md + USER.md) would otherwise accumulate
# the same class of cross-session facts about the operator as Engram, with no
# reconciliation between the two. Engram is this repo's designated
# cross-harness memory of record (session-bootstrap wiring, all four
# harnesses) -- hermes's own tier stays off so there is exactly one canonical
# long-term store.
memory:
  memory_enabled: false

# The skill-writing self-improvement loop (/learn, skill_manage) lands
# agent-authored SKILL.md files with no review gate by default upstream.
# Skills are hermes-local procedural knowledge -- not Engram's domain -- so
# the loop itself stays on, but agent-authored writes require a look before
# they land.
skills:
  write_approval: true
