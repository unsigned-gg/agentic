$schema: 'https://moonrepo.dev/schemas/project.json'

layer: 'tool'

project:
  name: 'harness-omp'
  description: 'oh-my-pi (omp) harness — install, models.yml local-endpoint presets'

tasks:
  lint:
    command: 'shellcheck install.sh tools/measure-context.sh'
    inputs:
      - 'install.sh'
      - 'tools/*.sh'
  test:
    command: 'bun test'
    inputs:
      - 'tests/**/*'
      - 'config/**/*'
      - 'install.sh'
      - 'README.md'
