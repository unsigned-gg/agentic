# omp custom providers — same endpoints as harness-pi's models.json, expressed
# in omp's models.yml schema (packages/coding-agent/src/config/models-config-schema.ts
# @ v16.3.12). apiKey values are resolved env-var-name-first, then literal
# (resolve-config-value.ts) — no secrets live in this file.
providers:
  llm:
    # The shared unsigned model-gateway (LiteLLM; renamed from "neuralwatt" —
    # that name now refers only to one upstream vendor). Model list mirrors
    # the gateway's /v1/models; key via UNSIGNED_LLM_API_KEY (1P: unsigned-llm).
    baseUrl: https://llm.unsigned.gg/v1
    api: openai-completions
    apiKey: UNSIGNED_LLM_API_KEY
    compat:
      # Crusoe upstream 403s OpenAI-only params (verified live 2026-07-06:
      # "Request blocked: parameter 'store' is not allowed")
      supportsStore: false
    models:
      # crusoe
      - id: zai/GLM-5.2
        contextWindow: 200000
        reasoning: true
      - id: deepseek-ai/DeepSeek-V4-Pro
        contextWindow: 131072
        reasoning: true
      - id: Qwen/Qwen3-235B-A22B-Instruct-2507
        contextWindow: 262144
      - id: moonshotai/Kimi-K2.6
        contextWindow: 131072
      # openrouter (context per live catalog 2026-07-07)
      - id: openai/gpt-5.5
        contextWindow: 1050000
        reasoning: true
      - id: google/gemini-3.5-flash
        contextWindow: 1048576
        reasoning: true
      - id: moonshotai/kimi-k2.7-code
        contextWindow: 262144
      - id: mistralai/devstral-2512
        contextWindow: 262144
      # anthropic (direct, cache-sticky gateway-side)
      - id: claude-sonnet-5
        contextWindow: 200000
        reasoning: true
      - id: claude-haiku-4-5
        contextWindow: 200000
      - id: claude-opus-4-8
        contextWindow: 200000
        reasoning: true
      # morphllm (fast-apply / edit specialists)
      - id: morph-v3-fast
        contextWindow: 32768
      - id: morph-glm52-744b
        contextWindow: 1000000
      # nemotron via the gateway (NVIDIA upstream; streams verified incl.
      # tools+reasoning 2026-07-18). Added after omp fell through to the
      # catalog's baseten/coreweave direct wiring with unset keys — the
      # "stream timed out waiting for first event" failure in reverie.
      - id: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B
        contextWindow: 131072
        reasoning: true
      - id: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B
        contextWindow: 131072
        reasoning: true
      - id: nvidia/NVIDIA-Nemotron-3-Ultra-550B
        contextWindow: 200000
        reasoning: true
      - id: nvidia/Nemotron-3-Nano-Omni-Reasoning-30B-A3B
        contextWindow: 131072
        reasoning: true
      # Full live-catalog sync (2026-07-18, operator directive): every id the
      # gateway serves resolves in every preset, so no name can fall through
      # to the built-in vendor-direct catalog wiring. Gateway alias/lane ids
      # mirror their base model's contextWindow; new-model windows are the
      # families' published values.
      - id: glm-5.2
        contextWindow: 200000
        reasoning: true
      - id: glm-5.2-fast
        contextWindow: 200000
        reasoning: true
      - id: glm-5.2-flex
        contextWindow: 200000
        reasoning: true
      - id: glm-5.2-short
        contextWindow: 200000
        reasoning: true
      - id: glm-5.2-short-fast
        contextWindow: 200000
        reasoning: true
      - id: glm-5.2-short-fast-flex
        contextWindow: 200000
        reasoning: true
      - id: glm-5.2-short-flex
        contextWindow: 200000
        reasoning: true
      - id: zai/GLM-5.1
        contextWindow: 200000
        reasoning: true
      - id: kimi-k2.6
        contextWindow: 131072
      - id: kimi-k2.6-fast
        contextWindow: 131072
      - id: kimi-k2.6-flex
        contextWindow: 131072
      - id: kimi-k2.7-code
        contextWindow: 262144
      - id: kimi-k2.7-code-flex
        contextWindow: 262144
      - id: deepseek-ai/DeepSeek-V3-0324
        contextWindow: 131072
      - id: deepseek-ai/Deepseek-V4-Flash
        contextWindow: 131072
        reasoning: true
      - id: google/gemma-4-31b-it
        contextWindow: 131072
      - id: meta-llama/Llama-3.3-70B-Instruct
        contextWindow: 131072
      - id: minimax/minimax-m2.7
        contextWindow: 200000
        reasoning: true
      - id: openai/gpt-oss-120b
        contextWindow: 131072
        reasoning: true
      - id: qwen3.5-397b
        contextWindow: 262144
      - id: qwen3.5-397b-fast
        contextWindow: 262144
      - id: qwen3.6-35b
        contextWindow: 262144
      - id: qwen3.6-35b-fast
        contextWindow: 262144
      - id: yutori/n1.5
        contextWindow: 131072
  ollama:
    baseUrl: http://localhost:11434/v1
    api: openai-completions
    apiKey: ollama
    discovery:
      type: ollama
    models:
      # 65536 = verified live at 64k via serve-ollama.sh (MODELS.md); models
      # left at 32768 are unverified at 64k — may not fit in VRAM there
      # (KV cache grows with context); see MODELS.md before bumping
      - id: qwen3.6-27b-mtp
        contextWindow: 65536
        reasoning: true
      - id: qwen3.6-35b-mtp
        contextWindow: 32768
        reasoning: true
      - id: hf.co/unsloth/GLM-4.7-Flash-GGUF:UD-Q4_K_XL
        contextWindow: 32768
        reasoning: true
      - id: hf.co/unsloth/Devstral-Small-2-24B-Instruct-2512-GGUF:UD-Q4_K_XL
        contextWindow: 32768
      - id: qwen3.5-9b-mtp
        contextWindow: 65536
        reasoning: true
  llamacpp:
    baseUrl: http://localhost:8080/v1
    api: openai-completions
    auth: none
    discovery:
      type: llama.cpp
    models:
      - id: local
  vllm:
    baseUrl: http://localhost:8000/v1
    api: openai-completions
    auth: none
    models:
      - id: served-model
