$schema: 'https://moonrepo.dev/schemas/toolchains.json'

# Toolchain versions come from .prototools (proto). moon manages the node
# toolchain (lockfile/manifest hashing + pnpm integration). rust/python/go run
# via proto-provided binaries inside the tag-task commands; enabling them as
# moon-managed toolchains needs plugin locators — deferred (see RD-13 follow-ups).
node:
  versionFromPrototools: 'node'
