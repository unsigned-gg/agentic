$schema: 'https://moonrepo.dev/schemas/toolchains.json'

# Toolchain versions come from .prototools (proto). The `javascript` section's
# packageManager is what makes moon run `pnpm install` before node tasks
# (InstallDependencies action, lockfile/manifest-change driven) — in moon 2.x
# it lives HERE, not under `node:` (1.x shape; that misplacement cost the
# first two CI runs). python runs via proto-provided uv inside tag tasks.
javascript:
  packageManager: 'pnpm'

node:
  versionFromPrototools: 'node'

pnpm:
  versionFromPrototools: 'pnpm'
