$schema: 'https://moonrepo.dev/schemas/toolchains.json'

# Toolchain versions come from .prototools (proto). moon manages the node
# toolchain; packageManager makes moon run `pnpm install` before node tasks —
# without it CI has no node_modules and every tsc/lint task 127s (hit on the
# first PR run). python runs via proto-provided uv inside tag-task commands.
node:
  versionFromPrototools: 'node'
  packageManager: 'pnpm'
  pnpm:
    versionFromPrototools: 'pnpm'
