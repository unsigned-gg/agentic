# Keeps the SHA-pinned actions and npm deps current (OPS-730). Dependabot
# updates SHA pins in place and preserves the trailing `# vN` comments.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
